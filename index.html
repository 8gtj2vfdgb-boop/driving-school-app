<!DOCTYPE html>
<html>
<head>
<title>K Gyasi Driving School</title>

<style>
:root{
 --bg:#eef2f7;
 --card:white;
 --text:black;
}
.dark{
 --bg:#0f172a;
 --card:#1e293b;
 --text:white;
}

body{
 font-family:Arial;
 background:var(--bg);
 color:var(--text);
 margin:0;
 padding:20px;
}

/* containers */
.container,.card,#adminPanel{
 background:var(--card);
 padding:20px;
 border-radius:15px;
 max-width:380px;
 margin:auto;
 margin-top:20px;
 text-align:center;
 box-shadow:0 5px 20px rgba(0,0,0,.2);
}

input,select{
 width:90%;
 padding:12px;
 margin:8px;
 border-radius:8px;
 border:1px solid #ccc;
}

button{
 padding:12px 20px;
 border:none;
 border-radius:10px;
 cursor:pointer;
 margin:5px;
}

.login-btn{background:#2563eb;color:white;width:95%}
.pay-btn{background:green;color:white}
.logout-btn{background:red;color:white}
.admin-btn{background:black;color:white}
.print-btn{background:orange;color:white}
.mode-btn{background:#6b7280;color:white}

/* hero */
.hero{
 background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
 url("https://images.unsplash.com/photo-1503376780353-7e6692767b70");
 background-size:cover;
 color:white;
 padding:50px 20px;
 border-radius:15px;
 text-align:center;
 max-width:500px;
 margin:auto;
}

#receipt{background:#dcfce7;padding:15px;border-radius:10px;margin-top:10px;display:none;text-align:left}
#adminPanel{display:none}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
<h2>Student Login</h2>
<input id="studentName" placeholder="Enter your name">
<input placeholder="Email">
<input type="password" placeholder="Password">
<button class="login-btn" onclick="login()">Login</button>
<button class="admin-btn" onclick="openAdmin()">Admin</button>
<button class="mode-btn" onclick="toggleMode()">Dark Mode</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<div class="hero">
<h1>K Gyasi Driving School </h1>
<p id="welcome"></p>
<p id="studentID"></p>
</div>

<div class="card">
<h2>Book Lesson</h2>

<select id="course">
<option value="">Select Course</option>
<option>Beginner Driving - GHC300</option>
<option>Highway Training - GHC400</option>
<option>Night Driving - GHC350</option>
<option>Theory & Road Signs - GHC250</option>
</select>

<input type="date" id="date">
<input type="time" id="time">

<select id="instructor">
<option>Mr Appiah Kubi</option>
<option>Mr Amankona</option>
<option>Madam Patiencep</option>
</select>

<select id="payment">
<option>Cash</option>
<option>Mobile Money</option>
<option>Card</option>
</select>

<button class="pay-btn" onclick="pay()">Pay & Book</button>

<div id="receipt"></div>

<button class="print-btn" onclick="printReceipt()">Print Receipt</button>
<button class="pay-btn" onclick="sendWhatsApp()">Send to WhatsApp</button>

</div>

<div class="container">
<button class="mode-btn" onclick="toggleMode()">Toggle Dark/Light</button>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

</div>

<!-- ADMIN -->
<div id="adminPanel" class="container">
<h2>Admin Panel</h2>
<ul id="adminList"></ul>
<button onclick="closeAdmin()">Close</button>
</div>

<script>

let currentBooking=null;

function generateID(name){
return "STU-"+name.substring(0,3).toUpperCase()+Math.floor(1000+Math.random()*9000);
}

function login(){
let name=document.getElementById("studentName").value;
if(!name){alert("Enter name");return}

let id=generateID(name);

localStorage.setItem("student",name);
localStorage.setItem("studentID",id);

document.getElementById("welcome").innerText="Welcome "+name;
document.getElementById("studentID").innerText="Student ID: "+id;

loginPage.style.display="none";
dashboard.style.display="block";
}

function logout(){
dashboard.style.display="none";
loginPage.style.display="block";
}

function pay(){

let booking={
name:localStorage.getItem("student"),
id:localStorage.getItem("studentID"),
course:course.value,
date:date.value,
time:time.value,
instructor:instructor.value,
payment:payment.value
};

if(!booking.course||!booking.date||!booking.time){
alert("Fill all fields");return;
}

currentBooking=booking;

let all=JSON.parse(localStorage.getItem("allBookings"))||[];
all.push(booking);
localStorage.setItem("allBookings",JSON.stringify(all));

receipt.style.display="block";
receipt.innerHTML=
`<h3>RECEIPT</h3>
Student: ${booking.name}<br>
ID: ${booking.id}<br>
Course: ${booking.course}<br>
Date: ${booking.date}<br>
Time: ${booking.time}<br>
Instructor: ${booking.instructor}<br>
Payment: ${booking.payment}<br>
<b>Status: CONFIRMED</b>`;
}

function printReceipt(){
window.print();
}

function sendWhatsApp(){
if(!currentBooking){alert("Book first");return}
let text=`Driving Lesson Booked
Name: ${currentBooking.name}
ID: ${currentBooking.id}
Course: ${currentBooking.course}
Date: ${currentBooking.date}
Time: ${currentBooking.time}`;
window.open("https://wa.me/?text="+encodeURIComponent(text));
}

function toggleMode(){
document.body.classList.toggle("dark");
}

function openAdmin(){
adminPanel.style.display="block";
let list=document.getElementById("adminList");
list.innerHTML="";
let all=JSON.parse(localStorage.getItem("allBookings"))||[];
all.forEach(b=>{
let li=document.createElement("li");
li.innerText=`${b.name} | ${b.id} | ${b.course} | ${b.date} ${b.time}`;
list.appendChild(li);
});
}

function closeAdmin(){
adminPanel.style.display="none";
}

</script>

</body>
</html>
