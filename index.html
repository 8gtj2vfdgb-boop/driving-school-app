<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicFlow MVP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --apple-pink: #fa243c;
            --bg-white: #ffffff;
            --light-gray: #f5f5f7;
            --text-main: #1d1d1f;
            --text-dim: #86868b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body { background-color: var(--bg-white); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Navigation */
        nav { width: 240px; border-right: 1px solid #e5e5e5; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--apple-pink); margin-bottom: 1rem; }
        .nav-item { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-main); font-weight: 500; padding: 8px 12px; border-radius: 8px; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: var(--light-gray); color: var(--apple-pink); }

        /* Main Content */
        main { flex: 1; padding: 2rem; overflow-y: auto; padding-bottom: 120px; }
        .search-bar { width: 100%; max-width: 400px; padding: 10px 15px; border-radius: 10px; border: none; background: var(--light-gray); margin-bottom: 2rem; }

        .section-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 1.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }

        /* Song Card */
        .card { background: var(--bg-white); border-radius: 12px; padding: 10px; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; border: 1px solid transparent; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-color: #eee; }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 8px; object-fit: cover; margin-bottom: 10px; }
        .card h4 { font-size: 1rem; margin-bottom: 4px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .card p { font-size: 0.85rem; color: var(--text-dim); }

        /* Player Bar */
        .player-bar { position: fixed; bottom: 0; width: 100%; height: 90px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-top: 1px solid #e5e5e5; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; }
        .current-track { display: flex; align-items: center; gap: 15px; width: 30%; }
        .current-track img { width: 50px; height: 50px; border-radius: 4px; }
        
        .controls { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 40%; }
        .control-btns { display: flex; align-items: center; gap: 25px; }
        .control-btns i { cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .control-btns i:hover { color: var(--apple-pink); }
        .play-btn { font-size: 2rem !important; }

        .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 0.75rem; }
        .progress-bar { flex: 1; height: 4px; background: #e5e5e5; border-radius: 2px; cursor: pointer; position: relative; }
        .progress-fill { width: 30%; height: 100%; background: var(--text-dim); border-radius: 2px; }

        .volume-ctrl { width: 30%; display: flex; justify-content: flex-end; align-items: center; gap: 10px; }

        /* Responsive */
        @media (max-width: 768px) {
            nav { display: none; }
            .player-bar { padding: 0 1rem; }
            .volume-ctrl { display: none; }
            .current-track { width: 60%; }
            .controls { width: 40%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fab fa-apple"></i> Music</div>
        <a href="#" class="nav-item active"><i class="fas fa-home"></i> Home</a>
        <a href="#" class="nav-item"><i class="fas fa-compass"></i> Browse</a>
        <a href="#" class="nav-item"><i class="fas fa-radio"></i> Radio</a>
        <hr style="border: 0; border-top: 1px solid #eee;">
        <p style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;">Library</p>
        <a href="#" class="nav-item"><i class="fas fa-clock"></i> Recently Added</a>
        <a href="#" class="nav-item"><i class="fas fa-music"></i> Songs</a>
        <a href="#" class="nav-item"><i class="fas fa-heart"></i> Favorites</a>
    </nav>

    <main>
        <input type="text" class="search-bar" placeholder="Search for artists, songs, or albums...">
        
        <section>
            <h2 class="section-title">Listen Now</h2>
            <div class="grid" id="song-grid">
                </div>
        </section>
    </main>

    <div class="player-bar">
        <div class="current-track">
            <img src="https://via.placeholder.com/50" id="now-playing-img" alt="cover">
            <div>
                <h4 id="now-playing-title">Select a song</h4>
                <p id="now-playing-artist">Artist</p>
            </div>
            <i class="far fa-heart" id="favorite-btn" style="margin-left: 10px; cursor: pointer;"></i>
        </div>

        <div class="controls">
            <div class="control-btns">
                <i class="fas fa-shuffle" title="Shuffle"></i>
                <i class="fas fa-backward-step"></i>
                <i class="fas fa-play-circle play-btn" id="master-play"></i>
                <i class="fas fa-forward-step"></i>
                <i class="fas fa-repeat" title="Repeat"></i>
            </div>
            <div class="progress-container">
                <span>1:24</span>
                <div class="progress-bar"><div class="progress-fill"></div></div>
                <span>3:45</span>
            </div>
        </div>

        <div class="volume-ctrl">
            <i class="fas fa-volume-low"></i>
            <div class="progress-bar" style="max-width: 100px;"><div class="progress-fill" style="width: 70%"></div></div>
        </div>
    </div>

    <script>
        // Mock Data
        const songs = [
            { id: 1, title: "Midnight City", artist: "M83", cover: "https://picsum.photos/seed/1/200" },
            { id: 2, title: "Starboy", artist: "The Weeknd", cover: "https://picsum.photos/seed/2/200" },
            { id: 3, title: "Levitating", artist: "Dua Lipa", cover: "https://picsum.photos/seed/3/200" },
            { id: 4, title: "Heat Waves", artist: "Glass Animals", cover: "https://picsum.photos/seed/4/200" },
            { id: 5, title: "Stay", artist: "The Kid LAROI", cover: "https://picsum.photos/seed/5/200" },
            { id: 6, title: "Blinding Lights", artist: "The Weeknd", cover: "https://picsum.photos/seed/6/200" }
        ];

        const songGrid = document.getElementById('song-grid');
        const masterPlay = document.getElementById('master-play');
        const favBtn = document.getElementById('favorite-btn');

        // Render Songs
        function renderSongs() {
            songGrid.innerHTML = songs.map(song => `
                <div class="card" onclick="playSong('${song.title}', '${song.artist}', '${song.cover}')">
                    <img src="${song.cover}" alt="${song.title}">
                    <h4>${song.title}</h4>
                    <p>${song.artist}</p>
                </div>
            `).join('');
        }

        // Logic for Player
        let isPlaying = false;
        function playSong(title, artist, cover) {
            document.getElementById('now-playing-title').innerText = title;
            document.getElementById('now-playing-artist').innerText = artist;
            document.getElementById('now-playing-img').src = cover;
            
            isPlaying = true;
            masterPlay.classList.replace('fa-play-circle', 'fa-pause-circle');
        }

        masterPlay.onclick = () => {
            if(!isPlaying) {
                masterPlay.classList.replace('fa-play-circle', 'fa-pause-circle');
                isPlaying = true;
            } else {
                masterPlay.classList.replace('fa-pause-circle', 'fa-play-circle');
                isPlaying = false;
            }
        };

        favBtn.onclick = () => {
            favBtn.classList.toggle('fas');
            favBtn.classList.toggle('far');
            favBtn.style.color = favBtn.classList.contains('fas') ? 'var(--apple-pink)' : 'inherit';
        };

        renderSongs();
    </script>
</body>
</html>
